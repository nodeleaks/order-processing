name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - name: Run unit tests
        run: npm run test:unit
        env:
          IS_LOCAL: 'true'
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

  integration:
    runs-on: ubuntu-latest
    needs: unit

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: orders_user
          POSTGRES_PASSWORD: orders_pass
          POSTGRES_DB: orders_db
        options: >-
          --health-cmd "pg_isready -U orders_user -d orders_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Start LocalStack
        run: |
          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -e LOCALSTACK_AUTH_TOKEN=${{ secrets.LOCALSTACK_AUTH_TOKEN }} \
            -e SERVICES=lambda,apigateway,sqs,sns,dynamodb,s3,stepfunctions,cloudwatch,iam \
            -e AWS_DEFAULT_REGION=us-east-1 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            localstack/localstack:4

      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "LocalStack is ready"
              exit 0
            fi
            echo "Waiting for LocalStack... ($i/45)"
            sleep 2
          done
          echo "LocalStack failed to start. Container logs:"
          docker logs localstack
          exit 1

      - name: Run Drizzle migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://orders_user:orders_pass@127.0.0.1:5432/orders_db

      - name: Seed test data
        run: npx tsx src/db/seed.ts
        env:
          DATABASE_URL: postgresql://orders_user:orders_pass@127.0.0.1:5432/orders_db

      - uses: hashicorp/setup-terraform@v3
      - name: Create dummy dist.zip for LocalStack
        run: make build
      - name: Clear stale CI state
        run: aws s3 rm s3://order-processing-tf-state-dev/ci.tfstate || true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Init LocalStack resources
        run: |
          terraform -chdir=terraform init -reconfigure -backend-config="bucket=order-processing-tf-state-dev" -backend-config="key=ci.tfstate" -backend-config="region=us-east-1"
          terraform -chdir=terraform apply -auto-approve -var="is_local=true" -var="environment=local"
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Start server
        run: npx tsx src/server.ts > server.log 2>&1 &
        env:
          IS_LOCAL: 'true'
          API_KEY: local-secret-key
          DATABASE_URL: postgresql://orders_user:orders_pass@127.0.0.1:5432/orders_db
          AWS_ENDPOINT: http://localhost:4566
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          DYNAMODB_TABLE_IDEMPOTENCY: order-processing-idempotency-local
          SQS_ORDERS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/order-processing-orders-local.fifo
          SQS_NOTIFICATIONS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/order-processing-notifications-local
          SNS_ORDER_EVENTS_ARN: arn:aws:sns:us-east-1:000000000000:order-events

      - name: Wait for server
        run: npx wait-on http://127.0.0.1:3000/health --timeout 15000

      - name: Run integration tests
        run: npm run test:integration
        env:
          IS_LOCAL: 'true'
          API_KEY: local-secret-key
          DATABASE_URL: postgresql://orders_user:orders_pass@127.0.0.1:5432/orders_db
          AWS_ENDPOINT: http://localhost:4566
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          DYNAMODB_TABLE_IDEMPOTENCY: order-processing-idempotency-local
          SQS_ORDERS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/order-processing-orders-local.fifo
          SQS_NOTIFICATIONS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/order-processing-notifications-local

      - name: Print server logs (on failure)
        if: failure()
        run: cat server.log

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build Lambda bundle
        run: |
          # Clean and recreate a fresh build folder
          rm -rf build_artifacts && mkdir -p build_artifacts
          
          # Bundle main entries into build_artifacts/ with .mjs extension
          npx esbuild src/lambda.ts --bundle --platform=node --target=node22 --outfile=build_artifacts/lambda.mjs --format=esm --banner:js="import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
          
          # Explicitly bundle each handler to the root
          for f in src/handlers/*.ts; do
            name=$(basename "$f" .ts)
            npx esbuild "$f" --bundle --platform=node --target=node22 --outfile="build_artifacts/$name.mjs" --format=esm --banner:js="import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
          done
      - name: Create Lambda zip
        run: |
          cd build_artifacts && zip -rq ../bundle.zip .
      - uses: hashicorp/setup-terraform@v3
      - name: Run Drizzle migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed dev data
        run: npx tsx src/db/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to AWS
        run: |
          terraform -chdir=terraform init -reconfigure -backend-config="bucket=order-processing-tf-state-dev" -backend-config="key=dev.tfstate" -backend-config="region=us-east-1"
          terraform -chdir=terraform apply -auto-approve \
            -var="environment=dev" \
            -var="is_local=false" \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="api_key=${{ secrets.API_KEY }}" \
            -var="lambda_zip_path=../bundle.zip"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Run smoke tests
        run: npm ci && npm run test:smoke
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
