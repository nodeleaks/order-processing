name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    needs: test

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        env:
          SERVICES: lambda,sqs,dynamodb,sns,stepfunctions
          AWS_DEFAULT_REGION: us-east-1

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: orders_user
          POSTGRES_PASSWORD: orders_pass
          POSTGRES_DB: orders_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Run Drizzle migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://orders_user:orders_pass@localhost:5432/orders_db

      - name: Init LocalStack resources
        run: bash scripts/localstack-init.sh
        env:
          AWS_DEFAULT_REGION: us-east-1

      - name: Start server
        run: npm run dev &
        env:
          IS_LOCAL: 'true'
          DATABASE_URL: postgresql://orders_user:orders_pass@localhost:5432/orders_db
          AWS_ENDPOINT: http://localhost:4566
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          DYNAMODB_TABLE_IDEMPOTENCY: idempotency-keys
          SQS_ORDERS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/order-processing-orders-local.fifo
          SQS_NOTIFICATIONS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/order-processing-notifications-local
          SNS_ORDER_EVENTS_ARN: arn:aws:sns:us-east-1:000000000000:order-events

      - name: Wait for server
        run: npx wait-on http://localhost:3000/health --timeout 15000

      - name: Run integration tests
        run: npm run test:integration
        env:
          IS_LOCAL: 'true'
          DATABASE_URL: postgresql://orders_user:orders_pass@localhost:5432/orders_db
          AWS_ENDPOINT: http://localhost:4566
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          DYNAMODB_TABLE_IDEMPOTENCY: idempotency-keys
          SQS_ORDERS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/order-processing-orders-local.fifo
          SQS_NOTIFICATIONS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/order-processing-notifications-local

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm run build
      - name: Create Lambda zip
        run: zip -r dist.zip dist node_modules package.json
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        run: terraform -chdir=terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Terraform apply
        run: |
          terraform -chdir=terraform apply -auto-approve \
            -var="environment=prod" \
            -var="aws_endpoint=" \
            -var="lambda_zip_path=../dist.zip"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Run smoke tests
        run: npm run test:smoke
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
